name: Update Purple Contribution Graph

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-graph:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate SVG
        env:
          GITHUB_USERNAME: ${{ vars.PROFILE_USERNAME }}
          TARGET_REPO: ${{ vars.TARGET_REPO }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: node scripts/profile-graph/generate.mjs

      - name: Commit and push if changed
        run: |
          git add assets/github-contribution-purple.svg

          if git diff --cached --quiet; then
            echo "No SVG changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(profile): update purple contribution graph"
          git push
